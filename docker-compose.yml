services:
  postgres:
    image: postgres:latest
    container_name: projeto_amil_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projeto_amil
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - postgres_store:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: projeto_amil_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  mongo:
    image: mongo:7
    container_name: projeto_amil_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: projeto_amil
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projeto_amil_app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - redis
      - mongo
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-jwt-secret
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin123
      COOKIE_SECRET: dev-cookie-secret
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projeto_amil
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://mongo:mongo@mongo:27017/projeto_amil?authSource=admin
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      R2_AUDIO_MAX_BYTES: ${R2_AUDIO_MAX_BYTES:-10737418240}
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
    command: sh -c "npm install && npm install --prefix frontend && npm exec prisma generate --schema=src/core/prisma/schema.prisma && npm run build:frontend && npm run start:dev"
volumes:
  postgres_store:
  redis_data:
  mongo_data:
