services:
  postgres:
    image: postgres:latest
    container_name: projeto_amil_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projeto_amil
      PGDATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - postgres_store:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: projeto_amil_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projeto_amil_app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 3000
      JWT_SECRET: dev-jwt-secret
      AUTH_USERNAME: admin
      AUTH_PASSWORD: admin123
      COOKIE_SECRET: dev-cookie-secret
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/projeto_amil
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
    command: sh -c "npm install && npm install --prefix frontend && npm run build:frontend && npm run start:dev"

  frontend:
    image: node:22-alpine
    container_name: projeto_amil_frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - app
    environment:
      NODE_ENV: development
    ports:
      - '5173:5173'
    volumes:
      - ./:/app
    command: sh -c "npm install --prefix frontend && npm run dev --prefix frontend -- --host 0.0.0.0 --port 5173"
volumes:
  postgres_store:
  redis_data:
